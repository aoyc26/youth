<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOYC'26 REGISTRATION | Iran Ologo</title>
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="register.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="balls">
            <div class="ball1"></div>
            <div class="ball2"></div>
            <div class="ball3"></div>
    </div>

    <div class="glow-blob">
            <div class="blob-top"></div>
            <div class="blob-bottom"></div>
    </div>
    
    <nav>
        <div class="logo">
            <img src="icon.png">
            <a href="index.html">
                AOYC <span style="color: #798df1">'26 </span>
            </a>
        </div>
        <div class="navs">
            <ul>
                <li>
                    <a href="index.html">BACK TO HOME</a>
                </li>
            </ul>
        </div>
    </nav>

    <header>
        <div class="text">
            <p class="tacn">
                A gathering designed to ignite your purpose. Share your expectations and join the movement.
            </p>
        </div>
    </header>

    <main class="reg-container">
        <section class="reg-glass-card">
            <form class="register">
                <p class="heading">RESERVE YOUR SEAT</p>
                <div class="input-group-row">
                    <label for="fullname">YOUR FULL NAME*</label>
                    <input id="fullName" type="text" required placeholder="Enter your first and last name">
                </div>
                <div class="input-group-row">
                    <label>WHATSAPP PHONE NUMBER*</label>
                    <input id="phoneNumber" type="tel" required placeholder="e.g.,08012345678">
                </div>
                <div class="input-group-row">
                    <label>EMAIL ADDRESS*</label>
                    <input id="emailAddress" type="email" required placeholder="username@email.com">
                </div>
                <div class="input-group-row">
                    <label>ASSEMBLY*</label>
                    <input id="assembly" type="text" required placeholder="Enter your assembly">
                </div>
                <div class="input-group-row">
                    <label>SELECT YOUR DISTRICT*</label>
                    <select id="district">
                        <option value="ATAN-OTA">--Select Your District--</option>
                        <option value="ATAN-OTA">ATAN-OTA</option>
                        <option value="IGBESA">IGBESA</option>
                        <option value="ONIBUKU">ONIBUKU</option>
                        <option value="LUSADA">LUSADA</option>
                        <option value="ORE-AKINDE">ORE-AKINDE</option>
                        <option value="IGBO-OLOMI">IGBO-OLOMI</option>
                        <option value="ISEBOH">ISEBOH</option>
                        <option value="IMOSEH">IMOSEH</option>
                        <option value="OTHERS"> OTHERS</option>
                    </select>
                </div>
                <div class="input-group-row">
                    <label>SLEEPOVERS</label>
                    <select id="sleepovers" size="1" multiple>
                        <option value="FRIDAY">FRIDAY NIGHT</option>
                        <option value="SATURDAY">SATURDAY NIGHT</option>
                    </select>
                    <label >PAST EXPERIENCES OR EXPECTATIONS</label>
                    <textarea required id="expectations" placeholder="Share your testimonies from last year or your expectations for AOYC'26"></textarea>
                </div>
                <button type="submit" class="submit-btn">Complete Registration</button>
            </form>
        </section>
    </main>

    <footer class="app-footer">
        <p class="footer-copyright">&copy; 2026 TACN Atan Ota Area Youth Covention. All Rights Reserved.</p>
        <p class="footer-branding">Engineered by Bright Nation | <span style="color: #798df1;">08151172355</span></p>
    </footer>

    <script src="register.js"></script>
</body>
</html>
